name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make validate.sh executable
        run: chmod +x scripts/validate.sh
      - name: Run structural validation
        run: bash scripts/validate.sh
